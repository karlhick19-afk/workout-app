<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="theme-color" content="#000000">
<title>12-Week Workout</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#000;color:#fff;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;overflow:hidden}
#app{height:100%;display:flex;flex-direction:column}
.screen{display:none;flex:1;flex-direction:column;overflow:hidden}
.screen.active{display:flex}

/* scrollable content */
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px;padding-bottom:40px}

/* sticky header */
.sticky-hdr{background:#000;padding:12px 16px;border-bottom:0.5px solid #2C2C2E;flex-shrink:0}

/* home */
.app-title{font-size:26px;font-weight:700;margin-bottom:2px}
.app-sub{color:#8E8E93;font-size:13px;margin-bottom:22px}
.phase-block{margin-bottom:26px}
.phase-hdr{border-left:3px solid;padding-left:12px;margin-bottom:12px}
.phase-name{font-size:15px;font-weight:700}
.phase-wks{color:#8E8E93;font-size:11px;margin-top:2px}
.week-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.week-card{background:#1C1C1E;border-radius:14px;padding:14px;border:1px solid #2C2C2E;cursor:pointer;active:opacity:0.7}
.week-card.done{border-color:#22C55E;background:#0D2B17}
.week-top{display:flex;justify-content:space-between;margin-bottom:4px}
.week-num{color:#fff;font-size:14px;font-weight:600}
.week-check{color:#22C55E;font-size:14px;font-weight:700}
.week-sub{color:#8E8E93;font-size:11px;margin-bottom:5px;line-height:14px}
.week-days{color:#48484A;font-size:10px}

/* week screen */
.back-btn{color:#636366;font-size:14px;background:none;border:none;cursor:pointer;padding:0;margin-bottom:10px}
.phase-pill{display:inline-block;border-radius:20px;padding:3px 12px;font-size:12px;font-weight:600;margin-bottom:10px}
.wk-title{font-size:24px;font-weight:700;margin-bottom:2px}
.wk-sub{color:#8E8E93;font-size:14px;margin-bottom:14px}
.focus-box{background:#1C1C1E;border-radius:12px;padding:13px;margin-bottom:14px}
.focus-lbl{color:#636366;font-size:10px;font-weight:600;letter-spacing:0.8px;margin-bottom:4px}
.focus-txt{color:#E5E5EA;font-size:13px;line-height:19px}
.goals-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-bottom:20px}
.goal-card{background:#1C1C1E;border-radius:10px;padding:9px 6px;text-align:center}
.goal-val{color:#fff;font-size:12px;font-weight:700;margin-bottom:2px}
.goal-lbl{color:#636366;font-size:9px}
.sec-hdr{color:#fff;font-size:16px;font-weight:700;margin-bottom:11px}
.day-card{background:#1C1C1E;border-radius:14px;padding:15px;margin-bottom:9px;display:flex;align-items:center;border:1px solid #2C2C2E;cursor:pointer}
.day-card.done{border-color:#22C55E;background:#0D2B17}
.day-left{flex:1}
.day-name{color:#fff;font-size:15px;font-weight:700;margin-bottom:2px}
.day-label{color:#8E8E93;font-size:12px;margin-bottom:3px}
.day-count{color:#48484A;font-size:10px}
.day-badge{font-size:13px;font-weight:700}
.done-badge{color:#22C55E}
.start-badge{color:#0A84FF}
.tip-box{background:#1C1C1E;border-radius:12px;padding:13px;margin-top:6px;margin-bottom:18px;border-left:3px solid #F59E0B}
.tip-lbl{color:#F59E0B;font-size:10px;font-weight:700;letter-spacing:0.8px;margin-bottom:4px}
.tip-txt{color:#E5E5EA;font-size:12px;line-height:18px}
.wk-nav{display:flex;gap:10px;margin-top:4px}
.wk-nav-btn{flex:1;background:#1C1C1E;border-radius:10px;padding:12px;text-align:center;color:#0A84FF;font-size:13px;font-weight:600;border:none;cursor:pointer}

/* day screen */
.day-hdr-row{display:flex;align-items:center}
.day-hdr-back{color:#636366;font-size:20px;background:none;border:none;cursor:pointer;padding-right:12px}
.day-hdr-center{flex:1}
.day-hdr-title{color:#fff;font-size:14px;font-weight:700}
.day-hdr-sub{color:#8E8E93;font-size:12px}
.timer-btn{background:none;border:none;font-size:20px;cursor:pointer;padding-left:12px}
.done-banner{margin:14px 16px 0;background:#0D2B17;border-radius:12px;padding:13px;border:1px solid #22C55E;text-align:center;color:#22C55E;font-size:14px;font-weight:700}
.section{padding:18px 16px 0}
.section-title{color:#636366;font-size:10px;font-weight:700;letter-spacing:0.8px;text-transform:uppercase;margin-bottom:9px}
.ex-row{background:#1C1C1E;border-radius:12px;padding:13px;display:flex;align-items:flex-start;margin-bottom:7px;border:1px solid #2C2C2E;cursor:pointer}
.ex-row.checked{background:#0D2B17;border-color:#22C55E44}
.checkbox{width:22px;height:22px;border-radius:11px;border:2px solid #3A3A3C;display:flex;align-items:center;justify-content:center;margin-right:11px;flex-shrink:0;margin-top:1px;font-size:11px;font-weight:800;color:#fff}
.checkbox.checked{background:#22C55E;border-color:#22C55E}
.ex-body{flex:1}
.ex-name{color:#fff;font-size:14px;font-weight:600;margin-bottom:2px}
.ex-name.checked{color:#48484A;text-decoration:line-through}
.ex-detail{color:#8E8E93;font-size:11px;margin-bottom:1px}
.ex-note{color:#636366;font-size:10px;font-style:italic}
.sets-badge{background:#2C2C2E;border-radius:6px;padding:3px 7px;margin-left:8px;flex-shrink:0;align-self:flex-start}
.sets-badge-txt{color:#8E8E93;font-size:10px;font-weight:600}

/* rest timer */
.timer-panel{background:#1C1C1E;margin:0 16px;border-radius:16px;padding:14px;margin-top:12px}
.timer-panel-hdr{color:#8E8E93;font-size:11px;font-weight:600;letter-spacing:0.5px;text-transform:uppercase;margin-bottom:10px}
.timer-presets{display:flex;gap:7px;margin-bottom:11px}
.timer-preset{flex:1;padding:6px;border-radius:8px;background:#2C2C2E;border:none;color:#8E8E93;font-size:12px;font-weight:500;cursor:pointer;text-align:center}
.timer-preset.active{background:#3A3A3C;color:#fff}
.timer-track{height:5px;background:#3A3A3C;border-radius:3px;margin-bottom:9px;overflow:hidden}
.timer-fill{height:100%;border-radius:3px;transition:width 1s linear,background-color 1s}
.timer-count{font-size:30px;font-weight:700;text-align:center;margin-bottom:11px;font-variant-numeric:tabular-nums}
.timer-btns{display:flex;justify-content:center}
.timer-start{background:#22C55E;border:none;border-radius:10px;padding:10px 36px;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.timer-stop{background:#3A3A3C;border:none;border-radius:10px;padding:10px 36px;color:#FF453A;font-size:14px;font-weight:600;cursor:pointer}

.spacer{height:40px}
</style>
</head>
<body>
<div id="app">

  <!-- HOME SCREEN -->
  <div id="screen-home" class="screen active">
    <div class="scroll" id="home-scroll"></div>
  </div>

  <!-- WEEK SCREEN -->
  <div id="screen-week" class="screen">
    <div class="scroll" id="week-scroll"></div>
  </div>

  <!-- DAY SCREEN -->
  <div id="screen-day" class="screen">
    <div class="sticky-hdr">
      <div class="day-hdr-row">
        <button class="day-hdr-back" onclick="showWeek(state.currentWeek)">&#8592;</button>
        <div class="day-hdr-center">
          <div class="day-hdr-title" id="day-hdr-title"></div>
          <div class="day-hdr-sub" id="day-hdr-sub"></div>
        </div>
        <button class="timer-btn" onclick="toggleTimer()" id="timer-toggle-btn">&#9201;</button>
      </div>
    </div>
    <div class="scroll" id="day-scroll"></div>
  </div>

</div>

<script>

ic spine foam roll','60s','Slow rolls along t-spine','Excellent for posture + upper back health'),e('Couch stretch','60s/side','Hip flexor + quad stretch')]}]}}},

or balance')]}]}}},

 + couch stretch','60s/side each','')]}]}}},

};

// ─── STATE ──────────────────────────────────────────────────────────────────
const state={currentWeek:1,currentDay:null,timerOpen:false};
let progress={};
try{const s=localStorage.getItem('wk_progress');if(s)progress=JSON.parse(s);}catch(e){}
function saveProgress(){try{localStorage.setItem('wk_progress',JSON.stringify(progress));}catch(e){}}

// ─── PROGRESS HELPERS ────────────────────────────────────────────────────────
function exKey(w,day,si,ei){return`w${w}_${day}_${si}_${ei}`;}
function isDayDone(w,day){
  const d=W[w].days[day];
  return d.sections.every((s,si)=>s.exercises.every((_,ei)=>progress[exKey(w,day,si,ei)]));
}
function isWeekDone(w){return Object.keys(W[w].days).every(d=>isDayDone(w,d));}
function totalEx(day){return day.sections.reduce((a,s)=>a+s.exercises.length,0);}

// ─── SCREENS ────────────────────────────────────────────────────────────────
function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById('screen-'+id).classList.add('active');
}

function showHome(){
  showScreen('home');
  const el=document.getElementById('home-scroll');
  let h=`<p class="app-title">12-Week Plan</p><p class="app-sub">Tap a week to begin training</p>`;
  phases.forEach((ph,pi)=>{
    const wks=Array.from({length:4},(_,i)=>pi*4+i+1);
    h+=`<div class="phase-block"><div class="phase-hdr" style="border-left-color:${ph.color}">
      <div class="phase-name" style="color:${ph.color}">Phase ${ph.id}: ${ph.name}</div>
      <div class="phase-wks">Weeks ${ph.weeks}</div></div><div class="week-grid">`;
    wks.forEach(w=>{
      const wd=W[w];const done=isWeekDone(w);
      h+=`<div class="week-card${done?' done':''}" onclick="showWeek(${w})">
        <div class="week-top"><span class="week-num">Week ${w}</span>${done?'<span class="week-check">✓</span>':''}</div>
        <div class="week-sub">${wd.subtitle}</div>
        <div class="week-days">${Object.keys(wd.days).join(' · ')}</div></div>`;
    });
    h+=`</div></div>`;
  });
  el.innerHTML=h;
}

function showWeek(w){
  state.currentWeek=w;
  showScreen('week');
  const wd=W[w];const ph=getPhase(w);
  let h=`<button class="back-btn" onclick="showHome()">← All weeks</button>
    <div class="phase-pill" style="background:${ph.color}22;color:${ph.color}">Phase ${ph.id}: ${ph.name}</div>
    <div class="wk-title">${wd.title}</div>
    <div class="wk-sub">${wd.subtitle}</div>
    <div class="focus-box"><div class="focus-lbl">FOCUS</div><div class="focus-txt">${wd.focus}</div></div>
    <div class="goals-row">`;
  wd.goals.forEach(g=>{h+=`<div class="goal-card"><div class="goal-val">${g.value}</div><div class="goal-lbl">${g.label}</div></div>`;});
  h+=`</div><div class="sec-hdr">Training Days</div>`;
  Object.entries(wd.days).forEach(([day,data])=>{
    const done=isDayDone(w,day);
    h+=`<div class="day-card${done?' done':''}" onclick="showDay(${w},'${day}')">
      <div class="day-left">
        <div class="day-name">${day}</div>
        <div class="day-label">${data.label}</div>
        <div class="day-count">${totalEx(data)} exercises</div>
      </div>
      <div class="day-badge ${done?'done-badge':'start-badge'}">${done?'✓ Done':'Start →'}</div></div>`;
  });
  h+=`<div class="tip-box"><div class="tip-lbl">💡 WEEK TIP</div><div class="tip-txt">${wd.tip}</div></div>
    <div class="wk-nav">
      ${w>1?`<button class="wk-nav-btn" onclick="showWeek(${w-1})">← Week ${w-1}</button>`:''}
      ${w<12?`<button class="wk-nav-btn" onclick="showWeek(${w+1})">Week ${w+1} →</button>`:''}
    </div><div class="spacer"></div>`;
  document.getElementById('week-scroll').innerHTML=h;
}

// ─── TIMER ──────────────────────────────────────────────────────────────────
let timerDuration=90,timerRemaining=null,timerInterval=null,timerRunning=false;
function toggleTimer(){
  state.timerOpen=!state.timerOpen;
  document.getElementById('timer-toggle-btn').textContent=state.timerOpen?'✕':'⏱';
  renderDayTimer();
}
function renderDayTimer(){
  const existing=document.getElementById('timer-panel');
  if(existing)existing.remove();
  if(!state.timerOpen)return;
  const presets=[60,90,120,180];
  const fmtT=s=>`${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;
  const pct=timerRemaining!==null?timerRemaining/timerDuration:1;
  const color=pct>0.5?'#22C55E':pct>0.25?'#F59E0B':'#EF4444';
  const display=timerRemaining!==null?(timerRemaining<=0?'Done!':fmtT(timerRemaining)):fmtT(timerDuration);
  let html=`<div id="timer-panel" class="timer-panel">
    <div class="timer-panel-hdr">Rest Timer</div>
    <div class="timer-presets">`;
  presets.forEach(p=>{html+=`<button class="timer-preset${timerDuration===p&&!timerRunning?' active':''}" onclick="setTimerDuration(${p})">${p}s</button>`;});
  html+=`</div><div class="timer-track"><div class="timer-fill" id="timer-fill" style="width:${Math.round(pct*100)}%;background:${color}"></div></div>
    <div class="timer-count" id="timer-count">${display}</div>
    <div class="timer-btns">
      ${timerRunning
        ?`<button class="timer-stop" onclick="stopTimer()">Cancel</button>`
        :`<button class="timer-start" onclick="startTimer()">Start Rest</button>`}
    </div></div>`;
  const banner=document.getElementById('day-done-banner');
  const scroll=document.getElementById('day-scroll');
  if(banner){banner.insertAdjacentHTML('afterend',html);}
  else{scroll.insertAdjacentHTML('afterbegin',html);}
}
function setTimerDuration(d){if(!timerRunning){timerDuration=d;timerRemaining=null;renderDayTimer();}}
function startTimer(){
  stopTimer();
  timerRemaining=timerDuration;timerRunning=true;
  const tick=()=>{
    timerRemaining--;
    const pct=timerRemaining/timerDuration;
    const color=pct>0.5?'#22C55E':pct>0.25?'#F59E0B':'#EF4444';
    const fill=document.getElementById('timer-fill');
    const count=document.getElementById('timer-count');
    if(fill)fill.style.cssText=`width:${Math.round(pct*100)}%;background:${color}`;
    if(count)count.textContent=timerRemaining<=0?'Done!':`${Math.floor(timerRemaining/60)}:${String(timerRemaining%60).padStart(2,'0')}`;
    if(timerRemaining<=0){
      clearInterval(timerInterval);timerRunning=false;
      if(navigator.vibrate)navigator.vibrate([400,200,400]);
      setTimeout(()=>{timerRemaining=null;renderDayTimer();},2000);
    }
  };
  timerInterval=setInterval(tick,1000);
  renderDayTimer();
}
function stopTimer(){clearInterval(timerInterval);timerRunning=false;timerRemaining=null;}

// ─── DAY SCREEN ──────────────────────────────────────────────────────────────
function showDay(w,day){
  state.currentWeek=w;state.currentDay=day;
  stopTimer();state.timerOpen=false;
  const wd=W[w];const data=wd.days[day];
  document.getElementById('day-hdr-title').textContent=`${wd.title} · ${day}`;
  document.getElementById('day-hdr-sub').textContent=data.label;
  document.getElementById('timer-toggle-btn').textContent='⏱';
  renderDayContent();
  showScreen('day');
}
function renderDayContent(){
  const w=state.currentWeek,day=state.currentDay;
  const data=W[w].days[day];const done=isDayDone(w,day);
  let h='';
  if(done)h+=`<div class="done-banner" id="day-done-banner">✓ Day complete! Great work.</div>`;
  data.sections.forEach((sec,si)=>{
    h+=`<div class="section"><div class="section-title">${sec.title}</div>`;
    sec.exercises.forEach((ex,ei)=>{
      const key=exKey(w,day,si,ei);const chk=!!progress[key];
      h+=`<div class="ex-row${chk?' checked':''}" onclick="toggleEx('${key}')">
        <div class="checkbox${chk?' checked':''}">${chk?'✓':''}</div>
        <div class="ex-body">
          <div class="ex-name${chk?' checked':''}">${ex.name}</div>
          ${ex.detail?`<div class="ex-detail">${ex.detail}</div>`:''}
          ${ex.note?`<div class="ex-note">${ex.note}</div>`:''}
        </div>
        <div class="sets-badge"><span class="sets-badge-txt">${ex.sets}</span></div>
      </div>`;
    });
    h+=`</div>`;
  });
  h+=`<div class="spacer"></div>`;
  document.getElementById('day-scroll').innerHTML=h;
  if(state.timerOpen)renderDayTimer();
}
function toggleEx(key){
  progress[key]=!progress[key];
  saveProgress();
  renderDayContent();
  if(state.timerOpen)renderDayTimer();
}

// ─── INIT ────────────────────────────────────────────────────────────────────
showHome();
</script>
